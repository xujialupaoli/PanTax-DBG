{% set name = "pantax-dbg" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

# source:
#   url: https://github.com/xujialupaoli/PanTax-DBG/archive/refs/tags/v0.1.0.tar.gz
#   sha256: xxxxxxxxx

build:
  skip: true  # [osx]
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cmake >=3.18
    - ninja
    - make
    - cargo-bundle-licenses
  host:
    - python >=3.8
    - pip
    - setuptools >=68
    - wheel
    - seqan3 ==3.3.0
    - cxxopts >=2.2.0
    - catch2 ==2.*
    - zlib
    - bzip2
    - raptor ==3.*
  run:
    - python >=3.8
    - pandas >=1.2.0
    - multitax >=1.3.1
    - genome_updater >=0.6.4
    - grep
    - coreutils
    - curl
    - diffutils
    - zlib
    - bzip2
    - raptor ==3.*
    - fastp

test:
  imports:
    - themis
    - themis_scripts
  commands:
    - pantax-dbg --help
    - test -x "$PREFIX/libexec/pantax-dbg/ganon"
    - test -x "$PREFIX/libexec/pantax-dbg/ganon-build"
    - test -x "$PREFIX/libexec/pantax-dbg/ganon-classify"
    - test -x "$PREFIX/libexec/pantax-dbg/ganon-report"
    - test -x "$PREFIX/libexec/pantax-dbg/dbg-ggcat"

about:
  home: https://github.com/xujialupaoli/PanTax-DBG
  summary: "PanTax-DBG: metagenomic profiler with bundled modified DBG-ganon and DBG-ggcat backends"
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  identifiers:
    - biotools:pantax-dbg
