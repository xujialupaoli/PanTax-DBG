# Recipe-specific variant pins for PanTax-DBG.
# Keep GCC/GXX at 13 because the current DBG-ganon/SeqAn3 build fails with GCC 15.
# Bioconda's global config zips python with is_python_min, so both keys must be given
# and the python value must match the global variant format exactly.
c_compiler_version:
  - 13
cxx_compiler_version:
  - 13
python:
  - 3.11.* *_cpython
is_python_min:
  - false
